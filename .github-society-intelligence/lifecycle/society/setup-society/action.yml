# Setup Society
#
# This composite action is the dispatcher for the single-workflow society.
# It is deliberately small, deterministic, and side-effect free:
# - it does not checkout or modify repository state;
# - it does not call an LLM or external service;
# - it only classifies the GitHub event into the job pool that should wake.
#
# The action is used by `.github/workflows/github-society-intelligence-agent.yml`
# and mirrored by `lifecycle/society/dispatcher.ts` for local regression tests.
# Any change to the routing table below should update both implementations and
# add or adjust a dispatcher fixture/test in the same PR.

name: Setup Society
description: Classify a GitHub event into the single-workflow society mode.
inputs:
  intent:
    description: Manual workflow intent. Empty and install preserve the original installer path.
    required: false
    default: ""
  settlement_id:
    description: Explicit settlement ID for dispatch-driven runs. Branch names are inspected when this is empty.
    required: false
    default: ""
outputs:
  mode:
    description: "Society mode selected for downstream jobs: think, act, observe, delegate, or settle."
    value: ${{ steps.dispatch.outputs.mode }}
  event_class:
    description: Fine-grained event class used by jobs inside a mode.
    value: ${{ steps.dispatch.outputs.event_class }}
  settlement_id:
    description: Active settlement ID when available, otherwise an empty string.
    value: ${{ steps.dispatch.outputs.settlement_id }}
runs:
  using: composite
  steps:
    - id: dispatch
      name: Compute mode, event class, and settlement ID
      shell: bash
      run: |
        set -euo pipefail

        # Inputs from GitHub's event context. Keep these as plain strings so
        # dispatch remains transparent in Actions logs and easy to fixture-test.
        EVENT_NAME="${GITHUB_EVENT_NAME:-}"
        INTENT="${{ inputs.intent }}"
        SETTLEMENT_INPUT="${{ inputs.settlement_id }}"
        REF_NAME="${GITHUB_REF_NAME:-}"
        HEAD_REF="${GITHUB_HEAD_REF:-}"
        ACTOR="${GITHUB_ACTOR:-}"

        MODE="act"
        EVENT_CLASS="unknown"
        SETTLEMENT_ID="$SETTLEMENT_INPUT"

        # Settlement IDs are allowed to arrive explicitly through dispatch, or
        # implicitly through a branch name such as:
        #   think/stl-2026-05-26-001/conversational-bee/topic
        if [ -z "$SETTLEMENT_ID" ]; then
          SOURCE_REF="${HEAD_REF:-$REF_NAME}"
          if [[ "$SOURCE_REF" =~ (stl-[0-9]{4}-[0-9]{2}-[0-9]{2}-[0-9]{3}) ]]; then
            SETTLEMENT_ID="${BASH_REMATCH[1]}"
          fi
        fi

        # Routing table:
        # - workflow_dispatch is multiplexed by intent.
        # - issue events wake act mode.
        # - PR and merge-queue events wake think mode.
        # - schedule wakes observe mode only.
        # - main pushes are settlement-side effects.
        case "$EVENT_NAME:$INTENT" in
          workflow_dispatch:|workflow_dispatch:install)
            MODE="act"; EVENT_CLASS="manual-install" ;;
          workflow_dispatch:observe)
            MODE="observe"; EVENT_CLASS="dispatch-observe" ;;
          workflow_dispatch:delegate)
            MODE="delegate"; EVENT_CLASS="dispatch-delegate" ;;
          workflow_dispatch:settle)
            MODE="settle"; EVENT_CLASS="dispatch-settle" ;;
          workflow_dispatch:import-memory)
            MODE="act"; EVENT_CLASS="dispatch-import-memory" ;;
          issues:*)
            MODE="act"; EVENT_CLASS="issue-opened" ;;
          issue_comment:*)
            if [[ "$ACTOR" == *"[bot]" ]]; then
              MODE="act"; EVENT_CLASS="ignored-bot-comment"
            elif jq -e '.issue.pull_request' "$GITHUB_EVENT_PATH" >/dev/null 2>&1; then
              MODE="act"; EVENT_CLASS="ignored-pr-comment"
            else
              MODE="act"; EVENT_CLASS="comment-issue"
            fi ;;
          pull_request:*|pull_request_target:*)
            MODE="think"; EVENT_CLASS="pr" ;;
          merge_group:*)
            MODE="think"; EVENT_CLASS="merge-group" ;;
          schedule:*)
            MODE="observe"; EVENT_CLASS="cron-daily" ;;
          push:*)
            if [ "$REF_NAME" = "main" ]; then
              MODE="settle"; EVENT_CLASS="push-main"
            else
              MODE="act"; EVENT_CLASS="push-branch"
            fi ;;
          *)
            MODE="act"; EVENT_CLASS="unknown" ;;
        esac

        # Downstream jobs consume these outputs exclusively. Avoid introducing
        # parallel mode decisions in individual jobs; that is what the
        # mode-gating censor is meant to prevent.
        echo "mode=$MODE" >> "$GITHUB_OUTPUT"
        echo "event_class=$EVENT_CLASS" >> "$GITHUB_OUTPUT"
        echo "settlement_id=$SETTLEMENT_ID" >> "$GITHUB_OUTPUT"
