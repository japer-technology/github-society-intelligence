# GitHub Society Intelligence - single workflow society runtime
#
# This is the only PLAN-derived workflow file in the repository. It intentionally
# contains every society mode as jobs inside one workflow instead of spreading the
# cognitive loop across think.yml, act.yml, observe.yml, delegate.yml, and
# settle.yml. The separate gsi-public-fabric.yml workflow is a public Pages
# publisher and is not part of this PLAN-derived runtime.
#
# Operational contract:
# - setup classifies each event into exactly one society mode.
# - every non-setup job depends on setup and gates on needs.setup.outputs.mode.
# - act jobs may respond to issues, install/upgrade, and open future PRs.
# - think jobs evaluate PRs and emit required checks.
# - observe jobs are scheduled or manually dispatched metadata observers only.
# - delegate jobs carry governed inter-agency hop metadata.
# - settle jobs are the only mode reserved for durable promotion to main.
#
# These comments are part of the implementation contract. If the job graph
# changes, update FINAL.md and FINAL-PLAN.md in the same PR.

name: github-society-intelligence-agent

on:
  # Human conversational surface. These events drive act mode.
  issues:
    types: [opened]
  issue_comment:
    types: [created]

  # Settlement review surface. These events drive think mode and required censors.
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  merge_group:

  # Main pushes are treated as settlement-side effects. The paths filter keeps
  # ordinary project pushes from waking the society runtime unnecessarily.
  push:
    branches: ["main"]
    paths:
      - ".github-society-intelligence/**"
      - ".github/workflows/github-society-intelligence-agent.yml"

  # Metadata-only B-brain cadence. Observe jobs must never wake from PR events.
  # Cron schedule temporarily disabled to ensure zero scheduled events.
  # schedule:
  #   - cron: "17 3 * * *"

  # Manual dispatch is multiplexed by intent. Empty or install intent preserves
  # the original install/upgrade workflow behavior.
  workflow_dispatch:
    inputs:
      intent:
        description: Society intent for the single agent workflow.
        required: false
        default: install
        type: choice
        options:
          - install
          - observe
          - delegate
          - settle
          - import-memory
      settlement_id:
        description: Optional settlement ID, e.g. stl-2026-05-26-001.
        required: false
        default: ""
      channel_id:
        description: Optional channel ID for delegate mode.
        required: false
        default: ""
      contract_sha:
        description: Optional pinned contract SHA for delegate mode.
        required: false
        default: ""
      payload_hash:
        description: Optional payload hash for delegate mode.
        required: false
        default: ""
      delegation_depth:
        description: Optional delegation depth for delegate mode.
        required: false
        default: "1"

permissions:
  # Write is still required because the inherited installer and issue agent can
  # commit the installed framework, session state, and agent-authored changes.
  contents: write
  issues: write
  pull-requests: write
  actions: write
  checks: read

jobs:
  # setup is the root of the job graph. It is deliberately cheap and deterministic:
  # no model calls, no repository mutation, and no state promotion. Its only job is
  # to classify the event so all other jobs can make a single gating decision.
  setup:
    name: setup
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.classify.outputs.mode }}
      event_class: ${{ steps.classify.outputs.event_class }}
      settlement_id: ${{ steps.classify.outputs.settlement_id }}
    steps:
      # Local composite actions require a checkout before `uses: ./.github/...`.
      # This keeps the dispatcher implementation in one reusable place instead
      # of duplicating mode logic directly in this workflow.
      - name: Checkout dispatcher action
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Classify society event
        id: classify
        uses: ./.github/actions/setup-society
        with:
          intent: ${{ github.event.inputs.intent || '' }}
          settlement_id: ${{ github.event.inputs.settlement_id || '' }}

  # act/install preserves the original template installer. It remains manual-only
  # and is disabled in the template repository to avoid self-install recursion.
  act-install:
    name: act/install
    runs-on: ubuntu-latest
    needs: setup
    if: >-
      needs.setup.outputs.mode == 'act'
      && needs.setup.outputs.event_class == 'manual-install'
      && github.repository != 'japer-technology/github-society-intelligence'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Check for .github-society-intelligence
        id: check-folder
        run: |
          if [ ! -d ".github-society-intelligence" ]; then
            echo "action=install" >> "$GITHUB_OUTPUT"
            echo ".github-society-intelligence not found; will install."
          else
            LOCAL_VERSION="0.0.0"
            if [ -f ".github-society-intelligence/VERSION" ]; then
              LOCAL_VERSION=$(tr -d '[:space:]' < .github-society-intelligence/VERSION)
            fi

            REMOTE_VERSION=$(curl -fsSL "https://raw.githubusercontent.com/japer-technology/github-society-intelligence/main/.github-society-intelligence/VERSION" | tr -d '[:space:]' || true)

            if [ -z "$REMOTE_VERSION" ]; then
              echo "::warning::Could not fetch remote VERSION; skipping upgrade check."
              echo "action=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            SEMVER_RE='^[0-9]+\.[0-9]+\.[0-9]+$'
            if ! [[ "$LOCAL_VERSION" =~ $SEMVER_RE ]] || ! [[ "$REMOTE_VERSION" =~ $SEMVER_RE ]]; then
              echo "::warning::VERSION format is not valid semver; skipping upgrade check."
              echo "action=skip" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            IFS='.' read -r L_MAJOR L_MINOR L_PATCH <<< "$LOCAL_VERSION"
            IFS='.' read -r R_MAJOR R_MINOR R_PATCH <<< "$REMOTE_VERSION"

            NEEDS_UPGRADE=false
            if [ "$R_MAJOR" -gt "$L_MAJOR" ]; then
              NEEDS_UPGRADE=true
            elif [ "$R_MAJOR" -eq "$L_MAJOR" ] && [ "$R_MINOR" -gt "$L_MINOR" ]; then
              NEEDS_UPGRADE=true
            elif [ "$R_MAJOR" -eq "$L_MAJOR" ] && [ "$R_MINOR" -eq "$L_MINOR" ] && [ "$R_PATCH" -gt "$L_PATCH" ]; then
              NEEDS_UPGRADE=true
            fi

            if [ "$NEEDS_UPGRADE" = true ]; then
              echo "action=upgrade" >> "$GITHUB_OUTPUT"
            else
              echo "action=skip" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Download and install from template
        if: steps.check-folder.outputs.action != 'skip'
        run: |
          set -euo pipefail

          ACTION="${{ steps.check-folder.outputs.action }}"
          TARGET=".github-society-intelligence"

          curl -fsSL "https://github.com/japer-technology/github-society-intelligence/archive/refs/heads/main.zip" \
            -o /tmp/template.zip
          unzip -q /tmp/template.zip -d /tmp/template

          EXTRACTED=$(ls -d /tmp/template/github-society-intelligence-*)

          rm -rf "$EXTRACTED/$TARGET/node_modules"
          rm -rf "$EXTRACTED/$TARGET/docs/analysis"

          if [ "$ACTION" = "upgrade" ]; then
            BACKUP="/tmp/si-backup"
            rm -rf "$BACKUP"
            mkdir -p "$BACKUP"
            if [ -f "$TARGET/AGENTS.md" ]; then cp "$TARGET/AGENTS.md" "$BACKUP/AGENTS.md"; fi
            if [ -d "$TARGET/.pi" ]; then cp -R "$TARGET/.pi" "$BACKUP/.pi"; fi
            if [ -d "$TARGET/state" ]; then cp -R "$TARGET/state" "$BACKUP/state"; fi

            rm -rf "$TARGET"
            cp -R "$EXTRACTED/$TARGET" "$TARGET"
            rm -rf "$TARGET/state"

            if [ -f "$BACKUP/AGENTS.md" ]; then cp "$BACKUP/AGENTS.md" "$TARGET/AGENTS.md"; fi
            if [ -d "$BACKUP/.pi" ]; then rm -rf "$TARGET/.pi"; cp -R "$BACKUP/.pi" "$TARGET/.pi"; fi
            if [ -d "$BACKUP/state" ]; then rm -rf "$TARGET/state"; cp -R "$BACKUP/state" "$TARGET/state"; fi

            if [ -d "$TARGET/.pi/.pi" ]; then
              rm -rf "$TARGET/.pi/.pi"
            fi
          else
            cp -R "$EXTRACTED/$TARGET" "$TARGET"
            rm -rf "$TARGET/state"
            cp "$TARGET/install/SOCIETY-INTELLIGENCE-AGENTS.md" "$TARGET/AGENTS.md"
            mkdir -p "$TARGET/.pi"
            cp "$TARGET/install/settings.json" "$TARGET/.pi/settings.json"
          fi

          if [ -d "$EXTRACTED/.github/actions" ]; then
            mkdir -p ".github/actions"
            cp -R "$EXTRACTED/.github/actions/setup-society" ".github/actions/setup-society"
          fi

      - name: Ensure .gitignore entries
        if: steps.check-folder.outputs.action != 'skip'
        run: |
          touch .gitignore
          for entry in \
            "node_modules/" \
            ".github-society-intelligence/node_modules/" \
            ".DS_Store" \
            "/.pi/" \
            ".github-society-intelligence/state/threads/" \
            ".github-society-intelligence/state/local-last-run.jsonl" \
            "tmpclaude-*" \
            "tmp-pi-*"; do
            grep -qxF "$entry" .gitignore || echo "$entry" >> .gitignore
          done

      - name: Ensure .gitattributes entries
        if: steps.check-folder.outputs.action != 'skip'
        run: |
          touch .gitattributes
          for entry in "memory.log merge=union"; do
            grep -qxF "$entry" .gitattributes || echo "$entry" >> .gitattributes
          done

      - name: Commit and push
        if: steps.check-folder.outputs.action != 'skip'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .github-society-intelligence/ .github/actions/ .gitignore .gitattributes

          ACTION="${{ steps.check-folder.outputs.action }}"
          if [ "$ACTION" = "upgrade" ]; then
            COMMIT_MSG="chore: upgrade .github-society-intelligence from template"
          else
            COMMIT_MSG="chore: install .github-society-intelligence from template"
          fi

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "$COMMIT_MSG"
            git push
          fi

  # act/conversational-bee/respond preserves the current issue/comment responder.
  # Later stages will make durable cognitive changes by opening settlement PRs;
  # today this keeps compatibility with the existing Git-versioned session model.
  act-conversational-bee-respond:
    name: act/conversational-bee/respond
    runs-on: ubuntu-latest
    needs: setup
    concurrency:
      group: github-society-intelligence-${{ github.repository }}-issue-${{ github.event.issue.number || github.run_id }}
      cancel-in-progress: false
    if: >-
      needs.setup.outputs.mode == 'act'
      && (
        needs.setup.outputs.event_class == 'issue-opened'
        || needs.setup.outputs.event_class == 'comment-issue'
      )
    steps:
      - name: Authorize
        id: authorize
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PERM=$(gh api "repos/${{ github.repository }}/collaborators/${{ github.actor }}/permission" --jq '.permission' 2>/dev/null || echo "none")
          echo "Actor: ${{ github.actor }}, Permission: $PERM"

          if [[ "$PERM" != "admin" && "$PERM" != "maintain" && "$PERM" != "write" ]]; then
            echo "::error::Unauthorized: ${{ github.actor }} has '$PERM' permission"
            exit 1
          fi

          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            REACTION_ID=$(gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=rocket --jq '.id' 2>/dev/null || echo "")
            if [[ -n "$REACTION_ID" ]]; then RID_JSON="\"$REACTION_ID\""; else RID_JSON="null"; fi
            echo '{"reactionId":'"$RID_JSON"',"reactionTarget":"comment","commentId":${{ github.event.comment.id }},"issueNumber":${{ github.event.issue.number }},"repo":"${{ github.repository }}"}' > /tmp/reaction-state.json
          else
            REACTION_ID=$(gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions" -f content=rocket --jq '.id' 2>/dev/null || echo "")
            if [[ -n "$REACTION_ID" ]]; then RID_JSON="\"$REACTION_ID\""; else RID_JSON="null"; fi
            echo '{"reactionId":'"$RID_JSON"',"reactionTarget":"issue","commentId":null,"issueNumber":${{ github.event.issue.number }},"repo":"${{ github.repository }}"}' > /tmp/reaction-state.json
          fi

      - name: Reject
        if: ${{ failure() && steps.authorize.outcome == 'failure' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "issue_comment" ]]; then
            gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" -f content=-1
          else
            gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/reactions" -f content=-1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Check for .github-society-intelligence
        id: check-folder
        run: |
          if [ -d ".github-society-intelligence" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::.github-society-intelligence folder not found, skipping."
          fi

      - name: Setup Bun
        if: steps.check-folder.outputs.exists == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"

      - name: Cache dependencies
        if: steps.check-folder.outputs.exists == 'true'
        uses: actions/cache@v5
        with:
          path: .github-society-intelligence/node_modules
          key: si-deps-${{ hashFiles('.github-society-intelligence/bun.lock') }}

      - name: Install dependencies
        if: steps.check-folder.outputs.exists == 'true'
        run: cd .github-society-intelligence && bun install --frozen-lockfile

      - name: Run
        if: steps.check-folder.outputs.exists == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PI_CACHE_RETENTION: long
          GSI_SOCIETY_MODE: act
          GSI_EVENT_CLASS: ${{ needs.setup.outputs.event_class }}
          GSI_SETTLEMENT_ID: ${{ needs.setup.outputs.settlement_id }}
        run: bun .github-society-intelligence/lifecycle/agent.ts

  # import-memory is present as an act-mode reserved surface so future memory
  # imports enter through the same dispatcher instead of adding import-memory.yml.
  act-import-memory-open:
    name: act/import-memory/open
    runs-on: ubuntu-latest
    needs: setup
    if: >-
      needs.setup.outputs.mode == 'act'
      && needs.setup.outputs.event_class == 'dispatch-import-memory'
    steps:
      - name: Import memory scaffold
        run: |
          echo "Memory import PR opening is reserved for the staged society implementation."

  # The three single-workflow scaffold censors make the file-count discipline
  # mechanically visible: dispatcher changes need fixtures, jobs must be
  # mode-gated, and job IDs must stay in one of the approved mode pools.
  think-censor-dispatcher-integrity:
    name: censor/dispatcher-integrity
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
      - name: Validate dispatcher invariants
        run: |
          set -euo pipefail
          test -f ".github/workflows/github-society-intelligence-agent.yml"
          grep -q "outputs:" ".github/workflows/github-society-intelligence-agent.yml"
          grep -q "mode:" ".github/workflows/github-society-intelligence-agent.yml"
          grep -q "event_class:" ".github/workflows/github-society-intelligence-agent.yml"
          grep -q "settlement_id:" ".github/workflows/github-society-intelligence-agent.yml"
          if find .github/workflows -maxdepth 1 -type f \( -name "think.yml" -o -name "act.yml" -o -name "agent.yml" -o -name "censor.yml" -o -name "observe.yml" -o -name "delegate.yml" -o -name "settle.yml" \) | grep -q .; then
            echo "::error::Forbidden PLAN-derived workflow file found."
            exit 1
          fi

  think-censor-mode-gating:
    name: censor/mode-gating
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: .github-society-intelligence/node_modules
          key: si-deps-${{ hashFiles('.github-society-intelligence/bun.lock') }}
      - name: Install dependencies
        run: cd .github-society-intelligence && bun install --frozen-lockfile
      - name: Validate workflow mode gating
        run: bun .github-society-intelligence/lifecycle/validate-workflow.ts

  think-censor-job-naming:
    name: censor/job-naming
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2"
      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: .github-society-intelligence/node_modules
          key: si-deps-${{ hashFiles('.github-society-intelligence/bun.lock') }}
      - name: Install dependencies
        run: cd .github-society-intelligence && bun install --frozen-lockfile
      - name: Validate workflow job naming
        run: bun .github-society-intelligence/lifecycle/validate-workflow.ts

  # Core think-mode censors. These are intentionally simple first-pass checks:
  # they establish required-check names and fail/warn on obvious violations while
  # leaving richer policy engines to later staged implementations.
  think-censor-credential:
    name: censor/credential
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan changed lines for obvious credentials
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF" || true
          DIFF=$(git diff --unified=0 "origin/$BASE_REF"...HEAD || git diff --unified=0 HEAD~1..HEAD || true)
          if printf '%s\n' "$DIFF" | grep -E '^\+' | grep -Ei '(BEGIN (RSA |OPENSSH |EC )?PRIVATE KEY|AKIA[0-9A-Z]{16}|OPENAI_API_KEY=|ANTHROPIC_API_KEY=|GITHUB_TOKEN=gh[pousr]_)'; then
            echo "::error::Potential credential found in changed lines."
            exit 1
          fi

  think-censor-pii:
    name: censor/pii
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Scan changed lines for obvious PII patterns
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF" || true
          DIFF=$(git diff --unified=0 "origin/$BASE_REF"...HEAD || git diff --unified=0 HEAD~1..HEAD || true)
          if printf '%s\n' "$DIFF" | grep -E '^\+' | grep -E '([0-9]{3}-[0-9]{2}-[0-9]{4}|[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,})'; then
            echo "::warning::Potential PII found. This scaffold warns today; later stages may fail closed."
          fi

  think-censor-representation-class:
    name: censor/representation-class
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Require representation class on memory YAML
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF" || true
          FILES=$(git diff --name-only "origin/$BASE_REF"...HEAD || true)
          for file in $FILES; do
            case "$file" in
              .github-society-intelligence/memory/*.yaml|.github-society-intelligence/memory/**/*.yaml)
                if [ -f "$file" ] && ! grep -q '^representation_class:' "$file"; then
                  echo "::error::$file must declare representation_class."
                  exit 1
                fi
                ;;
            esac
          done

  think-censor-append-only:
    name: censor/append-only
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Protect append-only ledgers and settlement records
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF" || true
          CHANGES=$(git diff --name-status "origin/$BASE_REF"...HEAD || true)
          while read -r status file rest; do
            [ -z "${status:-}" ] && continue
            case "$file" in
              .github-society-intelligence/memory/ledger/entries/*|.github-society-intelligence/settlements/*)
                if [ "$status" != "A" ]; then
                  echo "::error::$file is append-only and may only be added."
                  exit 1
                fi
                ;;
            esac
          done <<< "$CHANGES"

  think-censor-cross-directory-write:
    name: censor/cross-directory-write
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect cross-agency writes
        env:
          BASE_REF: ${{ github.base_ref || 'main' }}
        run: |
          set -euo pipefail
          git fetch --no-tags --depth=1 origin "$BASE_REF" || true
          AGENCIES=$(git diff --name-only "origin/$BASE_REF"...HEAD \
            | awk -F/ '/^\.github-society-intelligence\/agencies\/[^/]+\// { print $3 }' \
            | sort -u \
            | wc -l \
            | tr -d ' ')
          if [ "${AGENCIES:-0}" -gt 1 ] && [ -z "${{ needs.setup.outputs.settlement_id }}" ]; then
            echo "::warning::Cross-agency writes should carry a settlement ID. This scaffold warns until settlement labels are available to setup."
          fi

  think-censor-authority:
    name: censor/authority
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - uses: actions/checkout@v6
      - name: Verify governance authority files exist
        run: |
          set -euo pipefail
          test -f ".github-society-intelligence/governance/constitution.yaml"
          test -f ".github-society-intelligence/governance/authority-registry.yaml"

  # Cognitive-loop scaffolds. They encode the intended ordering now so future
  # implementations can fill in behavior without changing the workflow shape.
  think-cognition-perceive:
    name: think/cognition/perceive
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'think'
    steps:
      - name: Perceive scaffold
        run: echo "Perception step reserved for staged society cognition."

  think-cognition-activate:
    name: think/cognition/activate
    runs-on: ubuntu-latest
    needs: [setup, think-cognition-perceive]
    if: needs.setup.outputs.mode == 'think'
    steps:
      - name: Activate scaffold
        run: echo "Frame and K-line activation step reserved for staged society cognition."

  think-cognition-critique:
    name: think/cognition/critique
    runs-on: ubuntu-latest
    needs: [setup, think-cognition-activate]
    if: needs.setup.outputs.mode == 'think'
    steps:
      - name: Critique scaffold
        run: echo "Critic step reserved for staged society cognition."

  think-cognition-censor-aggregate:
    name: think/cognition/censor-aggregate
    runs-on: ubuntu-latest
    needs: [setup, think-censor-dispatcher-integrity, think-censor-mode-gating, think-censor-job-naming, think-censor-credential, think-censor-pii, think-censor-representation-class, think-censor-append-only, think-censor-cross-directory-write, think-censor-authority, think-cognition-critique]
    if: needs.setup.outputs.mode == 'think'
    steps:
      - name: Aggregate censor results
        run: echo "All required think-mode censors and cognition scaffolds completed."

  think-cognition-consolidate-wait:
    name: censor/consolidation-window
    runs-on: ubuntu-latest
    needs: [setup, think-cognition-censor-aggregate]
    if: needs.setup.outputs.mode == 'think'
    steps:
      - name: Consolidation window scaffold
        run: echo "Consolidation window enforcement is reserved for the staged society implementation."

  # Observe mode is the B-brain surface. It is metadata-only and unreachable from
  # pull_request events by construction because setup never emits observe for PRs.
  observe-censor-b-brain-content-access:
    name: censor/b-brain-content-access
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - uses: actions/checkout@v6
      - name: Verify B-brain constitutions are metadata-only
        run: |
          set -euo pipefail
          if grep -R "read_content: true" .github-society-intelligence/agencies/b-brains; then
            echo "::error::B-brain content access must remain disabled."
            exit 1
          fi

  observe-b-brain-activation-steward:
    name: observe/b-brain/activation-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Activation steward scaffold
        run: echo "Activation steward observes metadata only."

  observe-b-brain-memory-steward:
    name: observe/b-brain/memory-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Memory steward scaffold
        run: echo "Memory steward observes metadata only."

  observe-b-brain-channel-steward:
    name: observe/b-brain/channel-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Channel steward scaffold
        run: echo "Channel steward observes metadata only."

  observe-b-brain-bridge-steward:
    name: observe/b-brain/bridge-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Bridge steward scaffold
        run: echo "Bridge steward observes metadata only."

  observe-b-brain-economic-steward:
    name: observe/b-brain/economic-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Economic steward scaffold
        run: echo "Economic steward observes metadata only."

  observe-b-brain-governance-drift-steward:
    name: observe/b-brain/governance-drift-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Governance drift steward scaffold
        run: echo "Governance drift steward observes metadata only."

  observe-b-brain-self-model-steward:
    name: observe/b-brain/self-model-steward
    runs-on: ubuntu-latest
    needs: [setup, observe-censor-b-brain-content-access]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Self-model steward scaffold
        run: echo "Self-model steward observes metadata only."

  observe-ecology-report:
    name: observe/ecology-report
    runs-on: ubuntu-latest
    needs: [setup, observe-b-brain-activation-steward, observe-b-brain-memory-steward, observe-b-brain-channel-steward, observe-b-brain-bridge-steward, observe-b-brain-economic-steward, observe-b-brain-governance-drift-steward, observe-b-brain-self-model-steward]
    if: needs.setup.outputs.mode == 'observe'
    steps:
      - name: Ecology report scaffold
        run: echo "Ecology report publishing is reserved for the staged society implementation."

  # Delegate mode is the future inter-agency channel surface. Stage 3 caps depth
  # at one hop until governance explicitly raises the limit.
  delegate-censor-delegation-depth:
    name: censor/delegation-depth
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'delegate'
    steps:
      - name: Enforce delegation depth
        env:
          DELEGATION_DEPTH: ${{ github.event.inputs.delegation_depth || '1' }}
        run: |
          set -euo pipefail
          if [ "$DELEGATION_DEPTH" -gt 1 ]; then
            echo "::error::Stage 3 delegation depth cap is 1."
            exit 1
          fi

  delegate-hop-1:
    name: delegate/hop-1
    runs-on: ubuntu-latest
    needs: [setup, delegate-censor-delegation-depth]
    if: needs.setup.outputs.mode == 'delegate'
    steps:
      - name: Delegate scaffold
        env:
          SETTLEMENT_ID: ${{ needs.setup.outputs.settlement_id }}
          CHANNEL_ID: ${{ github.event.inputs.channel_id || '' }}
          CONTRACT_SHA: ${{ github.event.inputs.contract_sha || '' }}
          PAYLOAD_HASH: ${{ github.event.inputs.payload_hash || '' }}
        run: |
          echo "Delegation scaffold"
          echo "settlement_id=$SETTLEMENT_ID"
          echo "channel_id=$CHANNEL_ID"
          echo "contract_sha=$CONTRACT_SHA"
          echo "payload_hash=$PAYLOAD_HASH"

  # Settle mode is reserved for durable promotion. It never cancels in progress,
  # and current jobs are scaffolds until settlement closure is implemented.
  settle-censor-authority:
    name: settle/censor/authority
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'settle'
    steps:
      - uses: actions/checkout@v6
      - name: Verify settlement authority
        run: test -f ".github-society-intelligence/governance/authority-registry.yaml"

  settle-censor-credit-assignment:
    name: censor/credit-assignment
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'settle'
    steps:
      - name: Credit assignment scaffold
        run: echo "Credit assignment enforcement is reserved for the staged society implementation."

  settle-censor-append-only-ledger:
    name: settle/censor/append-only-ledger
    runs-on: ubuntu-latest
    needs: setup
    if: needs.setup.outputs.mode == 'settle'
    steps:
      - uses: actions/checkout@v6
      - name: Verify ledger maturity gate
        run: |
          set -euo pipefail
          grep -q "economic_layer_enabled: false" .github-society-intelligence/governance/maturity.yaml

  settle-close:
    name: settle/close
    runs-on: ubuntu-latest
    needs: [setup, settle-censor-authority, settle-censor-credit-assignment, settle-censor-append-only-ledger]
    concurrency:
      group: github-society-intelligence-settle-${{ needs.setup.outputs.settlement_id || github.run_id }}
      cancel-in-progress: false
    if: needs.setup.outputs.mode == 'settle'
    steps:
      - name: Settlement closure scaffold
        run: |
          echo "Settlement closure is reserved for the staged society implementation."
          echo "settlement_id=${{ needs.setup.outputs.settlement_id }}"
