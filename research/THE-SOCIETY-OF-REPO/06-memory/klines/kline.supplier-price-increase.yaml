id: kline.supplier-price-increase
title: Supplier Price Increase
version: 1
status: active

trigger:
  document_type: supplier_invoice
  price_change:
    above: 0.10   # more than 10% increase
  confidence_threshold: 0.80

activates:
  - agency: agency.supplier-bee
    weight: 0.95
  - agency: agency.finance-watch
    weight: 0.84
  - agency: agency.contract-bee
    weight: 0.71
  - agency: critic.cost
    weight: 0.88
  - agency: agency.owner-briefing
    weight: 0.80

suppresses:
  - agency: agency.intake-bee   # already classified; no re-routing needed
  - agency: agency.staff-bee    # unrelated to supplier-invoice pricing

reinforce_when:
  - owner confirms the briefing was useful
  - savings found as a result of the analysis
  - contract was renegotiated after the flag

weaken_when:
  - price increase was expected and previously noted in semantic memory
  - owner indicates this was a false alarm

metadata:
  established_date: 2026-05-07T00:00:00Z
  last_reinforced: 2026-05-07T00:00:00Z
  reinforcement_count: 1
  weakening_count: 0
  memory_temperature: hot
