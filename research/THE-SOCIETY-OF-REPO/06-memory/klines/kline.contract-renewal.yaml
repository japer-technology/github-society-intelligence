id: kline.contract-renewal
title: Contract Renewal Approaching
version: 1
status: active

trigger:
  document_type: contract
  renewal_date:
    within_days: 90
  confidence_threshold: 0.80

activates:
  - agency: agency.contract-bee
    weight: 0.95
  - agency: agency.finance-watch
    weight: 0.78
  - agency: agency.owner-briefing
    weight: 0.90
  - agency: critic.risk
    weight: 0.72

suppresses: []

reinforce_when:
  - owner acted on renewal information in time
  - contract was renegotiated successfully
  - renewal was processed without surprises

weaken_when:
  - renewal date was already in semantic memory and owner was aware
  - false alarm due to incorrect date extraction

metadata:
