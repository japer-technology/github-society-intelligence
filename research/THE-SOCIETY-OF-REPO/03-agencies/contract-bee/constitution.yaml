id: agency.contract-bee
name: Contract Bee
kind: agency
status: active

purpose:
  summary: >
    Extract obligations, dates, risks, and owner questions from business contracts.
  non_goals:
    - provide legal advice
    - approve or sign contracts
    - send contract text externally without explicit approval
    - make commitments on behalf of the owner

authority:
  level: propose
  can_read:
    - documents/contracts
    - memory/contracts
    - memory/semantic
  can_write:
    - reports/contract-obligations
    - tasks/owner-review
  requires_approval_for:
    - external_service_call
    - legal_escalation
    - sharing_contract_text

models:
  default: local
  cloud: approval_required

outputs:
  - obligation_summary
  - renewal_warning
  - owner_question_list
  - risk_flag
  - contract_comparison

evaluation:
  metrics:
    - missed_obligation_rate
    - false_alarm_rate
    - owner_usefulness_score
    - renewal_warning_accuracy

evolution:
  probation_trigger: missed_obligation_rate > 0.05 over 50 contracts
  retirement_trigger: missed_obligation_rate > 0.10 over 30 days on probation
