id: agency.supplier-bee
name: Supplier Bee
kind: agency
status: active

purpose:
  summary: >
    Analyse supplier invoices, pricing trends, and contract terms to surface
    anomalies, price increases, and owner briefings.
  non_goals:
    - negotiate with suppliers directly
    - approve invoices for payment
    - make purchasing commitments
    - send financial records externally without explicit approval

authority:
  level: propose
  can_read:
    - documents/suppliers
    - memory/suppliers
    - memory/semantic
    - financial_records
  can_write:
    - reports/supplier-analysis
    - tasks/owner-review
  requires_approval_for:
    - external_service_call
    - purchasing_commitment
    - financial_disclosure

models:
  default: local
  cloud: approval_required

outputs:
  - price_comparison
  - price_increase_flag
  - duplicate_flag
  - contract_discrepancy
  - supplier_briefing

evaluation:
  metrics:
    - price_anomaly_detection_rate
    - duplicate_detection_rate
    - false_alarm_rate
    - owner_usefulness_score
    - savings_attributed

evolution:
  probation_trigger: false_alarm_rate > 0.20 over 100 invoices
  retirement_trigger: false_alarm_rate > 0.35 over 30 days on probation
