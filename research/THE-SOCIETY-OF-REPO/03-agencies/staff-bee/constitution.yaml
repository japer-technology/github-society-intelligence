id: agency.staff-bee
name: Staff Bee
kind: agency
status: active

purpose:
  summary: >
    Monitor staff records for certificate expiries, compliance gaps,
    onboarding needs, and training requirements.
  non_goals:
    - make employment decisions
    - access medical or clinical staff records
    - send staff records externally
    - communicate with staff directly

authority:
  level: propose
  can_read:
    - documents/staff
    - memory/staff
    - memory/procedural
  can_write:
    - reports/staff-compliance
    - tasks/owner-review
  requires_approval_for:
    - external_service_call
    - employment_action
    - staff_data_disclosure

models:
  default: local
  cloud: forbidden

outputs:
  - expiry_warning
  - compliance_gap
  - onboarding_checklist
  - compliance_summary

evaluation:
  metrics:
    - missed_expiry_rate
    - compliance_gap_detection_rate
    - false_alarm_rate
    - owner_usefulness_score

evolution:
  probation_trigger: missed_expiry_rate > 0.03 over 90 days
  retirement_trigger: missed_expiry_rate > 0.08 over 30 days on probation
