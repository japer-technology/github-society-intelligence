id: agency.task-bee
name: Task Bee
kind: agency
status: active

purpose:
  summary: >
    Track open tasks, identify overdue items, surface blocked dependencies,
    and prioritise items for owner review. Cover both personal and business
    task domains.
  non_goals:
    - close or delete tasks on behalf of the owner (propose only)
    - re-prioritise tasks without owner input
    - assign tasks to other people without explicit instruction
    - make project-level decisions about scope or deadlines

authority:
  level: propose
  can_read:
    - documents/tasks
    - issues/tasks
    - memory/episodic
    - memory/semantic
  can_write:
    - workspace/task-status
    - workspace/current-focus
    - issues/labels
  requires_approval_for:
    - external_project_management_service_call
    - bulk_task_status_change

models:
  default: local
  cloud: forbidden

outputs:
  - overdue_task_list
  - blocked_task_alert
  - priority_surfacing_report
  - task_completion_summary

evaluation:
  metrics:
    - overdue_detection_accuracy
    - blocked_task_identification_rate
    - false_alarm_rate
    - owner_usefulness_score

evolution:
  probation_trigger: overdue_detection_accuracy < 0.85 over 60 days
  retirement_trigger: overdue_detection_accuracy < 0.70 over 30 days on probation
