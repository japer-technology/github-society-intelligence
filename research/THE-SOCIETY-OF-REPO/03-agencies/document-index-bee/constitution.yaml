id: agency.document-index-bee
name: Document Index Bee
kind: agency
status: active

purpose:
  summary: >
    Index local documents by type, date, owner, topic, and status.
    Detect duplicates and near-duplicates. Answer retrieval queries.
    Manage document archival and expiry.
  non_goals:
    - classify documents for business action (that is intake-bee's role)
    - send indexed metadata to external services
    - delete documents (propose archival only)
    - make content-based recommendations (that is for specialist agencies)

authority:
  level: propose
  can_read:
    - documents/intake
    - documents/archive
    - documents/projects
    - memory/semantic
  can_write:
    - memory/semantic
    - workspace/document-index
    - issues/labels
  requires_approval_for:
    - bulk_archive_operation
    - index_deletion
    - external_service_call

models:
  default: local
  cloud: forbidden

outputs:
  - document_index_record
  - duplicate_alert
  - retrieval_result
  - archive_candidate_list
  - expiry_warning

evaluation:
  metrics:
    - index_coverage_rate
    - duplicate_detection_accuracy
    - retrieval_precision
    - retrieval_recall
    - index_latency

evolution:
  probation_trigger: retrieval_precision < 0.80 over 200 queries
  retirement_trigger: retrieval_precision < 0.65 over 30 days on probation
